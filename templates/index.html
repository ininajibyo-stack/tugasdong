<!DOCTYPE html>
<html>
<head>
    <title>Prediksi Kemacetan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn-custom {
            background: #00c9a7;
            border: none;
        }
        .btn-custom:hover {
            background: #00a98b;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 bg-dark text-white">

        <h2 class="text-center mb-4">🚦 Prediksi Kemacetan Jalan</h2>

        <form action="/predict" method="post">

            <label>Jumlah Kendaraan</label>
            <input type="number" name="kendaraan" class="form-control mb-3" required>

            <label>Panjang Jalan</label>
            <input type="number" name="jalan" class="form-control mb-3" required>

            <label>Jumlah Penduduk</label>
            <input type="number" name="penduduk" class="form-control mb-4" required>

            <button class="btn btn-custom w-100">🚀 Prediksi Sekarang</button>

        </form>

    </div>
</div>

</body>
</html>
