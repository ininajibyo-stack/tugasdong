<!DOCTYPE html>
<html>
<head>
    <title>Hasil Prediksi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #232526, #414345);
            color: white;
        }
        .card {
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .lancar { color: #00ff88; }
        .sedang { color: #ffd700; }
        .macet { color: #ff4d4d; }

        .fade-in {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container mt-5 text-center fade-in">

    <h2>🚦 Hasil Prediksi</h2>

    <!-- HASIL -->
    <div class="card bg-dark mt-4">

        {% if hasil == "Lancar" %}
            <h1 class="lancar">🟢 {{ hasil }}</h1>
        {% elif hasil == "Sedang" %}
            <h1 class="sedang">🟡 {{ hasil }}</h1>
        {% else %}
            <h1 class="macet">🔴 {{ hasil }}</h1>
        {% endif %}

        <p class="mt-2">Kepadatan: {{ kepadatan }}</p>

    </div>

    <!-- GRAFIK -->
    <div class="row mt-5">

        <div class="col-md-6">
            <div class="card bg-dark">
                <h5>📉 Grafik Loss</h5>
                <img src="{{ url_for('static', filename='loss.png') }}" class="img-fluid rounded">
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-dark">
                <h5>📈 Grafik Accuracy</h5>
                <img src="{{ url_for('static', filename='accuracy.png') }}" class="img-fluid rounded">
            </div>
        </div>

    </div>

    <a href="/" class="btn btn-primary mt-4">🔙 Kembali</a>

</div>

</body>
</html>
